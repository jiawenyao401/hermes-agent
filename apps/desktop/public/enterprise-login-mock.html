<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentOS 企业登录</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(0, 83, 253, 0.08), transparent 42%),
          linear-gradient(180deg, #f8fbff 0%, #f3f7ff 100%);
        color: #17171a;
      }
      .card {
        width: min(92vw, 408px);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 24px 64px rgba(24, 54, 127, 0.12);
        padding: 34px 32px 30px;
      }
      .logo {
        width: 72px;
        height: 72px;
        display: block;
        margin: 0 auto 18px;
      }
      .title {
        margin: 0 0 6px;
        text-align: center;
        color: #1452f4;
        font-size: 34px;
        line-height: 1;
        font-weight: 700;
      }
      .subtitle {
        margin: 0 0 22px;
        text-align: center;
        color: #64748b;
        font-size: 14px;
        line-height: 1.7;
      }
      .field {
        margin-bottom: 18px;
      }
      label {
        display: block;
        margin-bottom: 9px;
        color: #111827;
        font-size: 14px;
        font-weight: 600;
      }
      input {
        width: 100%;
        height: 48px;
        border: 1px solid #e5e7eb;
        border-radius: 999px;
        padding: 0 18px;
        font-size: 15px;
        outline: none;
        transition: border-color 120ms ease, box-shadow 120ms ease;
        background: #fff;
      }
      input:focus {
        border-color: #1452f4;
        box-shadow: 0 0 0 4px rgba(20, 82, 244, 0.08);
      }
      .error {
        margin: 0 0 16px;
        border-radius: 16px;
        background: #fff1f2;
        padding: 12px 14px;
        color: #be123c;
        font-size: 14px;
        line-height: 1.6;
      }
      button {
        width: 100%;
        height: 48px;
        border: 0;
        border-radius: 999px;
        background: #09090b;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #18181b;
      }
      .hint {
        margin-top: 14px;
        text-align: center;
        color: #94a3b8;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="__LOGO_URL__" alt="AgentOS" />
      <h1 class="title">AgentOS</h1>
      <p class="subtitle">请输入用户名和密码完成企业授权。授权成功后将自动返回桌面客户端。</p>
      __ERROR_MESSAGE__
      <form action="__FORM_ACTION__" method="post">
        <div class="field">
          <label for="username">用户名</label>
          <input id="username" name="username" placeholder="请输入用户名" type="text" />
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" name="password" placeholder="请输入密码" type="password" />
        </div>
        <button type="submit">登录</button>
      </form>
      <div class="hint">当前为 mock 登录流程，提交后会回写企业远程网关。</div>
    </main>
  </body>
</html>
